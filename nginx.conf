##############################################################
#  Colmac — Manuals Server
#  Dominio:  manuals.colmac.it   (cambia con il tuo)
#  PDF path: /var/www/colmac-manuals/pdfs/
#
#  URL pubblica:  https://manuals.colmac.it/CL-2000
#                 → serve /var/www/colmac-manuals/pdfs/CL-2000.pdf
##############################################################

server {
    listen 80;
    server_name manuals.colmac.it;

    # Redirect tutto HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name manuals.colmac.it;

    # --- Certificato SSL (generato con Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/manuals.colmac.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manuals.colmac.it/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Directory dove vivono i PDF ---
    root /var/www/colmac-manuals/pdfs;

    # --- Header di sicurezza base ---
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # --- Rotta principale: /CODICE-MACCHINARIO → serve CODICE-MACCHINARIO.pdf ---
    location ~ ^/([A-Za-z0-9_-]+)$ {
        set $machine_id $1;

        # Cerca il file PDF con quel nome
        try_files /$machine_id.pdf =404;

        # Il browser apre il PDF inline (non lo scarica)
        add_header Content-Type        "application/pdf";
        add_header Content-Disposition "inline; filename=$machine_id.pdf";

        # Cache: il browser tiene il PDF per 1 ora
        # Se aggiorni il file, i client lo riprendono entro 1 ora
        add_header Cache-Control "public, max-age=3600";
    }

    # --- Root: mostra lista macchinari (opzionale, vedi sotto) ---
    location = / {
        return 200 "Colmac Manuals — usa /CODICE-MACCHINARIO";
        add_header Content-Type text/plain;
    }

    # --- Blocca accesso diretto alla cartella /pdfs ---
    location /pdfs {
        deny all;
        return 403;
    }

    # --- Log ---
    access_log /var/log/nginx/colmac-manuals-access.log;
    error_log  /var/log/nginx/colmac-manuals-error.log;
}
